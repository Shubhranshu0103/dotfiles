name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install shellcheck stow just

      - name: Shellcheck
        run: shellcheck install.sh macos/defaults.sh vscode/install-profiles.sh

      - name: Remove runner-created dotfiles that conflict with stow
        run: rm -f ~/.gitconfig ~/.zshrc ~/.zprofile

      - name: Stow simulate
        run: stow --simulate --restow --target=$HOME zsh tmux nvim git ghostty starship mise
